name: nix

on:
  push:
    branches:
      - main
    paths:
      - flake.nix
      - flake.lock
      - .nix/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/nix.yml
  pull_request:
    branches:
      - main
    paths:
      - flake.nix
      - flake.lock
      - .nix/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/nix.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Verify all pinned flake inputs (all platforms)
        run: nix flake archive

      - name: Evaluate flake outputs for all systems
        run: nix flake check --all-systems --no-build

      - name: Build packages (x86_64-linux)
        run: nix build .#vykar .#vykar-server .#vykar-gui --print-build-logs
